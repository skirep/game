<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Kong Platform</title>
<style>
body { margin:0; background:#222; overflow:hidden; font-family:Arial; }
canvas { background:#87CEEB; display:block; margin:auto; touch-action:none; }
#controls {
 position:fixed; bottom:20px; width:100%; display:flex; justify-content:space-between;
}
.left-controls, .right-controls { display:flex; gap:10px; padding:0 20px; }
button {
 width:70px; height:70px; border:none; border-radius:50%; font-size:24px;
 background:rgba(255,255,255,0.7);
}
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<div id="controls">
 <div class="left-controls">
  <button id="left">◀</button>
  <button id="right">▶</button>
 </div>
 <div class="right-controls">
  <button id="jump">▲</button>
 </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const keys = {};
const player = {x:50,y:450,w:30,h:40,vx:0,vy:0,onGround:false};
const kong = {x:800,y:80,w:80,h:80};
const gravity = 0.7;
const platforms = [
{x:0,y:500,w:960,h:40},
{x:150,y:400,w:250,h:20},
{x:500,y:320,w:250,h:20},
{x:200,y:220,w:250,h:20},
{x:600,y:140,w:250,h:20}
];
const barrels=[];
let score=0;
setInterval(()=>{
 barrels.push({x:kong.x,y:kong.y+40,r:12,vx:-4});
},2000);
function input(){
 player.vx=0;
 if(keys.left) player.vx=-5;
 if(keys.right) player.vx=5;
}
function update(){
 input();
 player.vy += gravity;
 player.x += player.vx;
 player.y += player.vy;
 player.onGround=false;
 for(const p of platforms){
  if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h < p.y+20 && player.y+player.h+player.vy >= p.y){
   player.y = p.y-player.h;
   player.vy=0;
   player.onGround=true;
  }
 }
 barrels.forEach(b=>b.x+=b.vx);
 for(const b of barrels){
  const dx=(player.x+15)-(b.x+b.r);
  const dy=(player.y+20)-(b.y+b.r);
  if(Math.sqrt(dx*dx+dy*dy)<25){
   alert('Game Over! Score: '+score);
   location.reload();
  }
 }
 if(player.x>kong.x && player.y<kong.y+kong.h){
  alert('Has guanyat!');
  location.reload();
 }
 score++;
}
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle='#654321';
 platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
 ctx.fillStyle='red';
 ctx.fillRect(player.x,player.y,player.w,player.h);
 ctx.fillStyle='brown';
 ctx.fillRect(kong.x,kong.y,kong.w,kong.h);
 ctx.fillStyle='black';
 barrels.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});
 ctx.fillStyle='white';
 ctx.font='24px Arial';
 ctx.fillText('Score: '+score,20,30);
}
function loop(){
 update(); draw(); requestAnimationFrame(loop);
}
loop();
window.addEventListener('keydown',e=>{
 if(e.code==='ArrowLeft') keys.left=true;
 if(e.code==='ArrowRight') keys.right=true;
 if(e.code==='Space' && player.onGround) player.vy=-12;
});
window.addEventListener('keyup',e=>{
 if(e.code==='ArrowLeft') keys.left=false;
 if(e.code==='ArrowRight') keys.right=false;
});
function bind(id,action){
 const el=document.getElementById(id);
 el.addEventListener('touchstart',e=>{e.preventDefault();keys[action]=true;});
 el.addEventListener('touchend',e=>{e.preventDefault();keys[action]=false;});
}
bind('left','left');
bind('right','right');
document.getElementById('jump').addEventListener('touchstart',e=>{
 e.preventDefault(); if(player.onGround) player.vy=-12;
});
</script>
</body>
</html>
